services:
  - type: web
    name: riat-blog-jiten
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      - key: GENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
